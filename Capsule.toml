[package]
name = "astrid-capsule-identity"
version = "0.2.0"
description = "Agent identity capsule — owns spark config, builds system prompt"
authors = ["Joshua J. Bouw <dev@joshuajbouw.com>", "Unicity Labs <info@unicity-labs.com>"]
astrid-version = ">=0.1.0"

[[component]]
id = "identity-builder"
file = "astrid_capsule_identity.wasm"
type = "executable"
capabilities = { fs_read = ["home://"], fs_write = ["home://"] }

[exports.astrid]
spark = "1.0.0"

[capabilities]
ipc_publish = ["spark.v1.response.ready", "agent.v1.response", "tool.v1.execute.*.result", "tool.v1.response.describe.*"]
ipc_subscribe = ["tool.v1.execute.save_identity", "tool.v1.request.describe"]

[[interceptor]]
event = "spark.v1.request.build"
action = "handle_build_request"

[[interceptor]]
event = "cli.v1.command.execute"
action = "handle_command"

[[interceptor]]
event = "tool.v1.execute.save_identity"
action = "tool_execute_save_identity"

[[interceptor]]
event = "tool.v1.request.describe"
action = "tool_describe"

[[command]]
name = "identity-export"
description = "Export agent identity (spark config) to home://.config/spark.toml"

[[command]]
name = "identity-import"
description = "Import agent identity from home://.config/spark.toml into KV store"

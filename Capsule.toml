[package]
name = "astrid-capsule-react"
version = "0.1.0"
description = "ReAct loop: stateless coordinator for LLM reasoning and tool execution"
authors = ["Joshua J. Bouw <dev@joshuajbouw.com>", "Unicity Labs <info@unicity-labs.com>"]
astrid-version = ">=0.1.0"

[[component]]
id = "react"
file = "astrid_capsule_react.wasm"
type = "executable"

[imports]
"astrid:llm" = "^1.0"
"astrid:session" = "^1.0"
"astrid:spark" = "^1.0"
"astrid:context" = "^1.0"

[publish]
"spark.v1.request.build" = { wit = "@unicity-astrid/wit/spark/build-request" }
"prompt_builder.v1.assemble" = { wit = "@unicity-astrid/wit/prompt/assemble-request" }
"agent.v1.response" = { wit = "@unicity-astrid/wit/agent/response" }
"agent.v1.session_changed" = { wit = "@unicity-astrid/wit/agent/session-changed" }
"tool.v1.request.execute" = { wit = "@unicity-astrid/wit/types/tool-call" }
"tool.v1.request.cancel" = { wit = "@unicity-astrid/wit/tool/cancel-request" }
"llm.v1.request.generate.*" = { wit = "@unicity-astrid/wit/llm/generate-request" }
"context_engine.v1.compact" = { wit = "@unicity-astrid/wit/context/compact-request" }
"session.v1.request.get_messages" = { wit = "@unicity-astrid/wit/session/get-messages-request" }
"session.v1.request.clear" = { wit = "@unicity-astrid/wit/session/clear-request" }
# Lazy lookup of the active LLM provider topic. `active_model_changed`
# is a one-shot broadcast at registry startup that lands in the
# load-time principal's KV; a gateway-minted bearer (every non-default
# principal) sees its own empty per-invocation KV and has to ask the
# registry directly. Without this declaration the publish would fail
# with `CapabilityDenied` and the prompt pipeline halts at react's
# `handle_prompt_response`.
"registry.v1.get_active_model" = { wit = "@unicity-astrid/wit/registry/provider-entry" }

# `redrive_if_unready` bounces these response topics back onto the bus as a
# bounded retry when the turn state isn't visible yet (the round-trip is the
# backoff). Publish is gated separately from subscribe, so without these
# declarations the re-drive fails `CapabilityDenied` and the visibility-race
# workaround silently no-ops. Same WIT shapes as the matching [subscribe] rows.
"spark.v1.response.ready" = { wit = "@unicity-astrid/wit/spark/build-response" }
"prompt_builder.v1.response.assemble" = { wit = "@unicity-astrid/wit/prompt/assemble-response" }

[subscribe]
"session.v1.response.get_messages.*" = { wit = "@unicity-astrid/wit/session/get-messages-response" }
"session.v1.response.clear.*" = { wit = "@unicity-astrid/wit/session/clear-response" }
"context_engine.v1.response.compact" = { wit = "@unicity-astrid/wit/context/compact-response" }
"user.v1.prompt" = { wit = "@unicity-astrid/wit/user/prompt", handler = "handle_user_prompt" }
"spark.v1.response.ready" = { wit = "@unicity-astrid/wit/spark/build-response", handler = "handle_identity_response" }
"prompt_builder.v1.response.assemble" = { wit = "@unicity-astrid/wit/prompt/assemble-response", handler = "handle_prompt_response" }
"llm.v1.stream.*" = { wit = "@unicity-astrid/wit/llm/stream-event", handler = "handle_llm_stream" }
"tool.v1.execute.result" = { wit = "@unicity-astrid/wit/types/tool-call-result", handler = "handle_tool_result" }
"registry.v1.active_model_changed" = { wit = "@unicity-astrid/wit/registry/provider-entry", handler = "handle_model_changed" }
# On-demand response channel for the lazy `get_active_model` lookup
# declared above. No handler attribute — `active_llm_topic` drains
# this synchronously via subscribe-before-publish; routing through
# the dispatcher would lose the request/response correlation.
"registry.v1.response.get_active_model" = { wit = "@unicity-astrid/wit/registry/provider-entry" }
"astrid.v1.watchdog.tick" = { wit = "@unicity-astrid/wit/system/watchdog-tick", handler = "handle_watchdog_tick" }
"astrid.v1.event_bus.lagged" = { wit = "@unicity-astrid/wit/system/event-bus-lagged", handler = "handle_bus_lag" }
"system.v1.lifecycle.restart" = { wit = "@unicity-astrid/wit/system/lifecycle-restart", handler = "handle_lifecycle_restart" }
"session.v1.clear" = { wit = "@unicity-astrid/wit/session/clear-request", handler = "handle_session_clear" }

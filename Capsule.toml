[package]
name = "astrid-capsule-identity"
version = "0.1.0"
description = "Context Builder Capsule for Astrid OS"
authors = ["Astrid Core Team"]
astrid-version = ">=0.1.0"

[[component]]
id = "identity-builder"
file = "astrid_capsule_identity.wasm"
type = "executable"
# Identity builder only reads workspace files (AGENTS.md, .astridignore).
# global:// is not needed — add it here if/when global identity config is supported.
capabilities = { fs_read = ["workspace://"] }

[capabilities]
ipc_publish = ["identity.v1.response.ready"]

[[interceptor]]
event = "identity.v1.request.build"
action = "handle_build_request"

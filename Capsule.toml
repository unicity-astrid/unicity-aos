[package]
name = "astrid-capsule-prompt-builder"
version = "0.1.0"
description = "Assembles LLM prompts with plugin interceptor hooks for context injection and override"
authors = ["Joshua J. Bouw <dev@joshuajbouw.com>", "Unicity Labs <info@unicity-labs.com>"]
astrid-version = ">=0.1.0"

[[component]]
id = "prompt-builder"
file = "astrid_capsule_prompt_builder.wasm"

[exports.astrid]
prompt = "1.0.0"

[capabilities]
ipc_publish = [
    "prompt_builder.v1.response.*",
    "prompt_builder.v1.hook.before_build",
    "prompt_builder.v1.hook.after_build",
    "session.v1.request.get_messages",
]
ipc_subscribe = [
    # 3-segment wildcard (covers prompt_builder.v1.{any_single_segment})
    "prompt_builder.v1.*",
    # 4-segment exact (topic_matches requires equal segment count)
    "prompt_builder.v1.hook.before_build",
    "prompt_builder.v1.hook.after_build",
    "prompt_builder.v1.hook_response.*",
    "session.v1.response.get_messages.*",
]

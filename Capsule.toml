[package]
name = "astrid-capsule-context-engine"
version = "0.1.0"
description = "Pluggable context window compaction with interceptor hook support"
authors = ["Astrid Core Team"]
astrid-version = ">=0.1.0"

[[component]]
id = "context-engine"
file = "astrid_capsule_context_engine.wasm"
type = "executable"

[capabilities]
ipc_publish = [
    "context_engine.v1.response.*",
    "context_engine.v1.hook.before_compaction",
    "context_engine.v1.hook.after_compaction",
]
ipc_subscribe = [
    # 3-segment wildcard (covers context_engine.v1.{any_single_segment})
    "context_engine.v1.*",
    # 4-segment exact (topic_matches requires equal segment count)
    "context_engine.v1.hook.before_compaction",
    "context_engine.v1.hook.after_compaction",
    "context_engine.v1.hook_response.*",
]

[package]
name = "astrid-capsule-registry"
version = "0.1.0"
description = "LLM provider registry — discovers and manages available models"
authors = ["Astrid Core Team"]
astrid-version = ">=0.1.0"

[[component]]
id = "registry"
file = "astrid_capsule_registry.wasm"

[exports.astrid]
registry = "1.0.0"

[capabilities]
uplink = true
ipc_publish = [
    "registry.v1.response.*",
    "registry.v1.active_model_changed",
    "astrid.v1.request.get_capsule_metadata",
    "registry.v1.selection.*",
]
ipc_subscribe = [
    "astrid.v1.response.get_capsule_metadata",
    # 3-segment wildcard (covers registry.v1.{any_single_segment})
    "registry.v1.*",
    "cli.v1.command.execute",
    # 4-segment exact (topic_matches requires equal segment count, so registry.v1.* does NOT cover this)
    "registry.v1.selection.callback",
    "astrid.v1.capsules_loaded",
]

[[command]]
name = "models"
description = "List available LLM models or switch the active model"

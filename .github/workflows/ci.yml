name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: aos-ce-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  B3SUM_VERSION: 1.8.5

jobs:
  linux-release-smoke:
    name: Linux release smoke (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            libc: gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            libc: gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            libc: musl
            architecture: x86_64
            platform: linux/amd64
            image: docker.io/library/rust@sha256:e98196986adced5602f6e21c54babdbf2a8700400c7a78868324a3630e0c5d15
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            libc: musl
            architecture: aarch64
            platform: linux/arm64
            image: docker.io/library/rust@sha256:594694ee6b07747b63b5c265be2616b62e814180b66227e2c18c6ee85e4136be
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Build against the Linux release baseline
        if: matrix.libc == 'gnu'
        env:
          TARGET: ${{ matrix.target }}
          # Keep this digest synchronized with release.yml.
          LINUX_BUILD_IMAGE: docker.io/library/rust:1.95.0-bullseye@sha256:646e8ceea789b00c5cfa339816a3ed44940dbf1651dc167b78f3c0aefcae0025
        run: |
          docker run --rm \
            --env TARGET \
            --volume "$PWD:/workspace" \
            --workdir /workspace \
            "$LINUX_BUILD_IMAGE" \
            bash -euxo pipefail -c '
              if [[ "$TARGET" == aarch64-unknown-linux-gnu ]]; then
                rustup target add aarch64-unknown-linux-gnu
                apt-get update
                apt-get install -y --no-install-recommends \
                  gcc-aarch64-linux-gnu \
                  libc6-dev-arm64-cross
                export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              fi
              export CARGO_TARGET_DIR=/workspace/target/glibc-2.31
              cargo build --locked --release --target "$TARGET" -p unicity-aos-bootstrap
            '
      - name: Enforce the Linux glibc compatibility ceiling
        if: matrix.libc == 'gnu'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          python3 scripts/check_glibc.py --max-version 2.34 \
            "target/glibc-2.31/${TARGET}/release/aos"
      - name: Build in the native Linux musl environment
        if: matrix.libc == 'musl'
        env:
          ARCHITECTURE: ${{ matrix.architecture }}
          PLATFORM: ${{ matrix.platform }}
          # Platform manifest from the official Rust 1.95.0 Alpine 3.23 image.
          RUST_BUILD_IMAGE: ${{ matrix.image }}
          TARGET: ${{ matrix.target }}
        run: |
          SOURCE_SHA=$(git rev-parse --short=12 HEAD)
          docker run --rm \
            --platform "$PLATFORM" \
            --env ARCHITECTURE \
            --env CARGO_TERM_COLOR=always \
            --env SOURCE_SHA="$SOURCE_SHA" \
            --env TARGET \
            --volume "$PWD:/workspace" \
            --workdir /workspace \
            "$RUST_BUILD_IMAGE" \
            sh -ceu '
              case "$ARCHITECTURE:$(uname -m)" in
                x86_64:x86_64|aarch64:aarch64) ;;
                *) echo "musl build is not running on the native architecture" >&2; exit 1 ;;
              esac
              apk add --no-cache binutils build-base git perl pkgconf python3
              git config --global --add safe.directory /workspace
              [ "$(git rev-parse --short=12 HEAD)" = "$SOURCE_SHA" ]
              cargo build \
                --locked \
                --release \
                --target "$TARGET" \
                --target-dir target/musl \
                -p unicity-aos-bootstrap
              python3 scripts/check_static_elf.py --architecture "$ARCHITECTURE" \
                "target/musl/$TARGET/release/aos"
            '
      - name: Exercise the AOS binary in fresh Alpine
        if: matrix.libc == 'musl'
        env:
          PLATFORM: ${{ matrix.platform }}
          RUST_BUILD_IMAGE: ${{ matrix.image }}
          TARGET: ${{ matrix.target }}
        run: |
          docker run --rm \
            --platform "$PLATFORM" \
            --env TARGET \
            --volume "$PWD:/workspace:ro" \
            --workdir /workspace \
            "$RUST_BUILD_IMAGE" \
            sh -ceu '"target/musl/$TARGET/release/aos" --version'

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  release-contract:
    name: Release contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo install b3sum --locked --version "$B3SUM_VERSION"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v3.1.1'
      - run: sh -n install.sh
      - run: bash -n scripts/test-clean-home-musl-install.sh
      - run: python3 scripts/test_check_glibc.py
      - run: python3 scripts/test_check_static_elf.py
      - run: python3 scripts/test_astrid_musl_release.py
      - run: python3 scripts/test_musl_workflow_contract.py
      - run: python3 scripts/validate-release-contract.py
      - run: python3 scripts/test_validate_release_contract.py
      - run: python3 scripts/test_release_metadata.py
      - run: python3 scripts/test_musl_release_metadata.py
      - run: python3 scripts/test_nightly_version.py
      - run: python3 scripts/test_channel_transaction.py
      - run: python3 scripts/test_channel_publication.py
      - run: python3 scripts/test_release_publication.py
      - run: python3 scripts/test_runtime_command_surface.py
      - run: bash scripts/test-pinned-runtime-command-surface.sh
      - run: bash scripts/test-channel-workflow-contract.sh
      - run: python3 scripts/test_create_astrid_094_fixture.py
      - run: bash scripts/test-package-release.sh
      - run: bash scripts/test-install.sh
      - run: bash scripts/test-libc-detection.sh
      - run: bash scripts/test-install-musl.sh
      - run: python3 scripts/capsule_release.py
      - run: python3 scripts/test_capsule_release.py
      - run: python3 scripts/test_validate_runtime_archive.py
      - run: bash scripts/test-extract-runtime-tool.sh

  community-wasm:
    name: Community WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95.0"
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo metadata --locked --format-version 1 --no-deps
      - run: cargo check --locked --workspace --exclude unicity-aos-bootstrap --target wasm32-unknown-unknown
      - run: cargo clippy --locked --workspace --exclude unicity-aos-bootstrap --target wasm32-unknown-unknown -- -D warnings

  product-native:
    name: Product native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95.0"
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo install b3sum --locked --version "$B3SUM_VERSION"
      - run: cargo test --locked -p unicity-aos-bootstrap
      - run: cargo clippy --locked -p unicity-aos-bootstrap -- -D warnings
      - run: bash scripts/test-upgrade-self-heal.sh
      - run: bash scripts/test-final-runtime-boot-harness.sh

  capsule-tests:
    name: Capsule host tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95.0"
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --locked --workspace --exclude unicity-aos-bootstrap --target x86_64-unknown-linux-gnu

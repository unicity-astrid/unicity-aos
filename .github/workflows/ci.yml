name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: aos-ce-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  B3SUM_VERSION: 1.8.5

jobs:
  linux-release-smoke:
    name: Linux release smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Build against the Linux release baseline
        env:
          TARGET: ${{ matrix.target }}
          # Keep this digest synchronized with release.yml.
          LINUX_BUILD_IMAGE: docker.io/library/rust:1.95.0-bullseye@sha256:646e8ceea789b00c5cfa339816a3ed44940dbf1651dc167b78f3c0aefcae0025
        run: |
          docker run --rm \
            --env TARGET \
            --volume "$PWD:/workspace" \
            --workdir /workspace \
            "$LINUX_BUILD_IMAGE" \
            bash -euxo pipefail -c '
              if [[ "$TARGET" == aarch64-unknown-linux-gnu ]]; then
                rustup target add aarch64-unknown-linux-gnu
                apt-get update
                apt-get install -y --no-install-recommends \
                  gcc-aarch64-linux-gnu \
                  libc6-dev-arm64-cross
                export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              fi
              export CARGO_TARGET_DIR=/workspace/target/glibc-2.31
              cargo build --locked --release --target "$TARGET" -p unicity-aos-bootstrap
            '
      - name: Enforce the Linux glibc compatibility ceiling
        env:
          TARGET: ${{ matrix.target }}
        run: |
          python3 scripts/check_glibc.py --max-version 2.34 \
            "target/glibc-2.31/${TARGET}/release/aos"

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  release-contract:
    name: Release contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo install b3sum --locked --version "$B3SUM_VERSION"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - run: sh -n install.sh
      - run: python3 scripts/test_check_glibc.py
      - run: python3 scripts/validate-release-contract.py
      - run: python3 scripts/test_validate_release_contract.py
      - run: python3 scripts/test_release_metadata.py
      - run: python3 scripts/test_nightly_version.py
      - run: python3 scripts/test_channel_transaction.py
      - run: python3 scripts/test_channel_publication.py
      - run: python3 scripts/test_release_publication.py
      - run: python3 scripts/test_runtime_command_surface.py
      - run: bash scripts/test-pinned-runtime-command-surface.sh
      - run: bash scripts/test-channel-workflow-contract.sh
      - run: python3 scripts/test_create_astrid_094_fixture.py
      - run: bash scripts/test-package-release.sh
      - run: bash scripts/test-install.sh
      - run: python3 scripts/capsule_release.py
      - run: python3 scripts/test_capsule_release.py
      - run: python3 scripts/test_validate_runtime_archive.py
      - run: bash scripts/test-extract-runtime-tool.sh

  community-wasm:
    name: Community WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95.0"
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo metadata --locked --format-version 1 --no-deps
      - run: cargo check --locked --workspace --exclude unicity-aos-bootstrap --target wasm32-unknown-unknown
      - run: cargo clippy --locked --workspace --exclude unicity-aos-bootstrap --target wasm32-unknown-unknown -- -D warnings

  product-native:
    name: Product native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95.0"
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo install b3sum --locked --version "$B3SUM_VERSION"
      - run: cargo test --locked -p unicity-aos-bootstrap
      - run: cargo clippy --locked -p unicity-aos-bootstrap -- -D warnings
      - run: bash scripts/test-upgrade-self-heal.sh
      - run: bash scripts/test-final-runtime-boot-harness.sh

  capsule-tests:
    name: Capsule host tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95.0"
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --locked --workspace --exclude unicity-aos-bootstrap --target x86_64-unknown-linux-gnu

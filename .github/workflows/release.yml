name: Release Unicity AOS

on:
  push:
    tags:
      - '20[0-9][0-9].*'
      - '!20[0-9][0-9].*-nightly.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aos-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  B3SUM_VERSION: 1.8.5

jobs:
  classify:
    name: Classify release lane
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      nightly: ${{ steps.release.outputs.nightly }}
      version: ${{ steps.release.outputs.version }}
      source-commit: ${{ steps.release.outputs.source-commit }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Bind event, tag, and source commit
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          [[ "$GITHUB_REF" == refs/tags/* ]]
          VERSION="$GITHUB_REF_NAME"
          SOURCE_COMMIT=$(git rev-parse 'HEAD^{commit}')
          if [[ "$EVENT_NAME" == push ]]; then
            [[ "$VERSION" =~ ^(202[6-9]|20[3-9][0-9])\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
            NIGHTLY=false
          elif [[ "$EVENT_NAME" == workflow_dispatch ]]; then
            NIGHTLY_DATE="${VERSION#*-nightly.}"
            NIGHTLY_DATE="${NIGHTLY_DATE%%.g*}"
            RUN_CREATED_AT=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" --jq .created_at)
            python3 scripts/nightly_version.py validate-dispatch \
              --date "$NIGHTLY_DATE" \
              --created-at "$RUN_CREATED_AT"
            EXPECTED=$(python3 scripts/nightly_version.py derive \
              --date "$NIGHTLY_DATE" \
              --source-commit "$SOURCE_COMMIT")
            [[ "$VERSION" == "$EXPECTED" ]]
            git fetch --no-tags origin main
            git merge-base --is-ancestor "$SOURCE_COMMIT" origin/main
            NIGHTLY=true
          else
            echo "unsupported release event: $EVENT_NAME" >&2
            exit 1
          fi
          {
            echo "nightly=$NIGHTLY"
            echo "version=$VERSION"
            echo "source-commit=$SOURCE_COMMIT"
          } >> "$GITHUB_OUTPUT"

  validate-release:
    name: Validate release identity
    needs: classify
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.95.0'
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: aos-release-identity
      - name: Install pinned BLAKE3 checksum tool
        run: cargo install b3sum --locked --version "$B3SUM_VERSION"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Verify the pinned runtime command surface
        run: bash scripts/test-pinned-runtime-command-surface.sh
      - name: Refuse a nightly after its canonical base is tagged
        if: needs.classify.outputs.nightly == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE_VERSION=$(python3 - <<'PY'
          import tomllib
          with open("crates/unicity-aos-bootstrap/Cargo.toml", "rb") as file:
              print(tomllib.load(file)["package"]["version"])
          PY
          )
          BASE_REFS="$RUNNER_TEMP/canonical-base-refs.json"
          gh api "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/$BASE_VERSION" > "$BASE_REFS"
          if ! jq -e --arg ref "refs/tags/$BASE_VERSION" 'all(.ref != $ref)' "$BASE_REFS" >/dev/null; then
            echo "canonical $BASE_VERSION was tagged while this nightly waited for approval" >&2
            exit 1
          fi
      - name: Stage deterministic nightly version
        if: needs.classify.outputs.nightly == 'true'
        run: python3 scripts/nightly_version.py stage --version "$GITHUB_REF_NAME"
      - name: Match product, distro, and tag versions
        run: |
          EXTRA=()
          if [[ "${{ needs.classify.outputs.nightly }}" == true ]]; then
            EXTRA+=(--allow-nightly)
          fi
          python3 scripts/validate-release-contract.py --require-release-ready "${EXTRA[@]}"
          PRODUCT=$(sed -n 's/^version = "\([^"]*\)"/\1/p' crates/unicity-aos-bootstrap/Cargo.toml | head -n1)
          test "$PRODUCT" = "$GITHUB_REF_NAME"
      - run: bash scripts/test-package-release.sh
      - run: bash scripts/test-install.sh
      - run: python3 scripts/test_create_astrid_094_fixture.py
      - run: python3 scripts/capsule_release.py
      - run: python3 scripts/test_capsule_release.py
      - run: python3 scripts/test_validate_runtime_archive.py
      - run: bash scripts/test-extract-runtime-tool.sh
      - run: python3 scripts/test_check_glibc.py
      - run: sh -n install.sh

  build:
    name: Build (${{ matrix.target }})
    needs: [classify, validate-release, capsules]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Stage deterministic nightly version
        if: needs.classify.outputs.nightly == 'true'
        run: python3 scripts/nightly_version.py stage --version "$GITHUB_REF_NAME"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.95.0'
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: ${{ !endsWith(matrix.target, 'linux-gnu') }}
        with:
          key: aos-release-${{ matrix.target }}
      - name: Install pinned BLAKE3 checksum tool
        run: cargo install b3sum --locked --version "$B3SUM_VERSION"
      - name: Load runtime compatibility pins
        run: |
          python3 - <<'PY' >> "$GITHUB_ENV"
          import tomllib
          with open("release/runtime-compatibility.toml", "rb") as file:
              metadata = tomllib.load(file)["runtime"]
          print(f"RUNTIME_VERSION={metadata['version']}")
          print(f"RUNTIME_TAG={metadata['tag']}")
          print(f"RUNTIME_REPOSITORY={metadata['repository']}")
          print(f"RUNTIME_IDENTITY={metadata['release-workflow-identity']}")
          PY
      - name: Build product binary
        if: ${{ !endsWith(matrix.target, 'linux-gnu') }}
        run: |
          cargo build --locked --release --target "${{ matrix.target }}" -p unicity-aos-bootstrap
          echo "AOS_BINARY=target/${{ matrix.target }}/release/aos" >> "$GITHUB_ENV"
      - name: Build Linux product binary against glibc 2.31
        if: ${{ endsWith(matrix.target, 'linux-gnu') }}
        env:
          LINUX_BUILD_IMAGE: docker.io/library/rust@sha256:646e8ceea789b00c5cfa339816a3ed44940dbf1651dc167b78f3c0aefcae0025
          TARGET: ${{ matrix.target }}
        run: |
          docker run --rm \
            -e TARGET \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$LINUX_BUILD_IMAGE" \
            bash -euxo pipefail -c '
              if [[ "$TARGET" == aarch64-unknown-linux-gnu ]]; then
                rustup target add aarch64-unknown-linux-gnu
                apt-get update
                apt-get install -y --no-install-recommends \
                  gcc-aarch64-linux-gnu \
                  libc6-dev-arm64-cross
                export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
              fi
              export CARGO_TARGET_DIR=/workspace/target/glibc-2.31
              cargo build --locked --release --target "$TARGET" -p unicity-aos-bootstrap
            '
          AOS_BINARY="target/glibc-2.31/${{ matrix.target }}/release/aos"
          python3 scripts/check_glibc.py --max-version 2.34 "$AOS_BINARY"
          echo "AOS_BINARY=$AOS_BINARY" >> "$GITHUB_ENV"
      - name: Download pinned runtime release
        run: |
          ASSET="astrid-${RUNTIME_VERSION}-${{ matrix.target }}.tar.gz"
          BASE="https://github.com/${RUNTIME_REPOSITORY}/releases/download/${RUNTIME_TAG}"
          curl --proto '=https' --tlsv1.2 -fsSLO "$BASE/$ASSET"
          curl --proto '=https' --tlsv1.2 -fsSLO "$BASE/BLAKE3SUMS.txt"
          curl --proto '=https' --tlsv1.2 -fsSLo "$ASSET.sigstore.json" "$BASE/$ASSET.sigstore.json"
          EXPECTED=$(awk -v asset="$ASSET" '$2 == asset { print $1; exit }' BLAKE3SUMS.txt)
          test -n "$EXPECTED"
          test "$(b3sum -- "$ASSET" | awk '{print $1}')" = "$EXPECTED"
          echo "RUNTIME_ASSET=$ASSET" >> "$GITHUB_ENV"
          echo "RUNTIME_BLAKE3=$EXPECTED" >> "$GITHUB_ENV"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Verify runtime release identity
        run: |
          cosign verify-blob \
            --bundle "$RUNTIME_ASSET.sigstore.json" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "$RUNTIME_IDENTITY" \
            "$RUNTIME_ASSET"
      - name: Verify Linux runtime glibc compatibility
        if: ${{ endsWith(matrix.target, 'linux-gnu') }}
        run: |
          RUNTIME_ROOT="astrid-${RUNTIME_VERSION}-${{ matrix.target }}"
          CHECK_ROOT="$RUNNER_TEMP/runtime-glibc-check"
          python3 scripts/validate-runtime-archive.py \
            "$RUNTIME_ASSET" \
            "$RUNTIME_ROOT" \
            astrid astrid-daemon astrid-build astrid-emit
          mkdir "$CHECK_ROOT"
          tar -xzf "$RUNTIME_ASSET" -C "$CHECK_ROOT"
          python3 scripts/check_glibc.py --max-version 2.34 \
            "$CHECK_ROOT/$RUNTIME_ROOT/astrid" \
            "$CHECK_ROOT/$RUNTIME_ROOT/astrid-daemon" \
            "$CHECK_ROOT/$RUNTIME_ROOT/astrid-build" \
            "$CHECK_ROOT/$RUNTIME_ROOT/astrid-emit"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: capsule-artifacts
          name: aos-community-capsules
      - name: Compose product bundle
        run: |
          python3 scripts/capsule_release.py --artifacts capsule-artifacts
          scripts/package-release.sh \
            "${{ matrix.target }}" \
            "$AOS_BINARY" \
            "$RUNTIME_ASSET" \
            "$RUNTIME_BLAKE3" \
            capsule-artifacts \
            artifacts
      - name: Test a clean Community Edition home
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          mkdir "$RUNNER_TEMP/clean-home-bundle"
          tar -xzf "artifacts/unicity-aos-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" \
            -C "$RUNNER_TEMP/clean-home-bundle" --strip-components=1
          scripts/test-clean-home-init.sh "$RUNNER_TEMP/clean-home-bundle"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aos-${{ matrix.target }}
          path: artifacts/*.tar.gz

  capsules:
    name: Build Community capsules
    needs: [classify, validate-release]
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Stage deterministic nightly version
        if: needs.classify.outputs.nightly == 'true'
        run: python3 scripts/nightly_version.py stage --version "$GITHUB_REF_NAME"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.95.0'
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: aos-release-capsules
      - name: Install pinned BLAKE3 checksum tool
        run: cargo install b3sum --locked --version "$B3SUM_VERSION"
      - name: Load runtime compatibility pins
        run: |
          python3 - <<'PY' >> "$GITHUB_ENV"
          import tomllib
          with open("release/runtime-compatibility.toml", "rb") as file:
              metadata = tomllib.load(file)["runtime"]
          print(f"RUNTIME_VERSION={metadata['version']}")
          print(f"RUNTIME_TAG={metadata['tag']}")
          print(f"RUNTIME_REPOSITORY={metadata['repository']}")
          print(f"RUNTIME_IDENTITY={metadata['release-workflow-identity']}")
          PY
      - name: Download pinned runtime builder
        run: |
          TARGET=x86_64-unknown-linux-gnu
          ASSET="astrid-${RUNTIME_VERSION}-${TARGET}.tar.gz"
          BASE="https://github.com/${RUNTIME_REPOSITORY}/releases/download/${RUNTIME_TAG}"
          curl --proto '=https' --tlsv1.2 -fsSLO "$BASE/$ASSET"
          curl --proto '=https' --tlsv1.2 -fsSLO "$BASE/BLAKE3SUMS.txt"
          curl --proto '=https' --tlsv1.2 -fsSLo "$ASSET.sigstore.json" "$BASE/$ASSET.sigstore.json"
          EXPECTED=$(awk -v asset="$ASSET" '$2 == asset { print $1; exit }' BLAKE3SUMS.txt)
          test -n "$EXPECTED"
          test "$(b3sum -- "$ASSET" | awk '{print $1}')" = "$EXPECTED"
          echo "RUNTIME_ASSET=$ASSET" >> "$GITHUB_ENV"
          echo "RUNTIME_TARGET=$TARGET" >> "$GITHUB_ENV"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Verify runtime builder identity
        run: |
          cosign verify-blob \
            --bundle "$RUNTIME_ASSET.sigstore.json" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "$RUNTIME_IDENTITY" \
            "$RUNTIME_ASSET"
      - name: Build installable capsule assets
        run: |
          scripts/extract-runtime-tool.sh \
            "$RUNTIME_ASSET" \
            "$RUNTIME_VERSION" \
            "$RUNTIME_TARGET" \
            astrid-build \
            "$RUNNER_TEMP/astrid-build"
          scripts/build-capsule-assets.sh "$RUNNER_TEMP/astrid-build" artifacts
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aos-community-capsules
          path: artifacts/*.capsule

  github-release:
    name: Publish signed release
    needs: [classify, build, capsules]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Require repository immutable releases
        env:
          GH_TOKEN: ${{ secrets.AOS_RELEASE_ADMIN_TOKEN }}
        run: |
          [[ -n "$GH_TOKEN" ]]
          gh api "repos/$GITHUB_REPOSITORY/immutable-releases" \
            --jq 'select(.enabled == true) | true' | grep -Fx true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Stage deterministic nightly version
        if: needs.classify.outputs.nightly == 'true'
        run: python3 scripts/nightly_version.py stage --version "$GITHUB_REF_NAME"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.95.0'
      - name: Install pinned BLAKE3 checksum tool
        run: cargo install b3sum --locked --version "$B3SUM_VERSION"
      - name: Load runtime compatibility pins
        run: |
          python3 - <<'PY' >> "$GITHUB_ENV"
          import tomllib
          with open("release/runtime-compatibility.toml", "rb") as file:
              metadata = tomllib.load(file)["runtime"]
          print(f"RUNTIME_TAG={metadata['tag']}")
          PY
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: aos-*-*-*
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: capsule-artifacts
          name: aos-community-capsules
      - name: Validate downloaded capsule set
        run: |
          python3 scripts/capsule_release.py --artifacts capsule-artifacts
          cp capsule-artifacts/*.capsule artifacts/
      - name: Generate checksums
        run: |
          cd artifacts
          b3sum -- ./*.tar.gz ./*.capsule | sed 's#  \./#  #' > BLAKE3SUMS.txt
          sha256sum -- ./*.tar.gz ./*.capsule | sed 's#  \./#  #' > SHA256SUMS.txt
          cp ../release/runtime-compatibility.toml .
      - name: Generate immutable release metadata
        env:
          SOURCE_COMMIT: ${{ needs.classify.outputs.source-commit }}
        run: |
          PUBLISHED_AT=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          RELEASE_METADATA="artifacts/unicity-aos-${GITHUB_REF_NAME}-release.toml"
          python3 scripts/release_metadata.py render-release \
            --version "$GITHUB_REF_NAME" \
            --tag "$GITHUB_REF_NAME" \
            --source-commit "$SOURCE_COMMIT" \
            --published-at "$PUBLISHED_AT" \
            --artifacts artifacts \
            --sha256 artifacts/SHA256SUMS.txt \
            --blake3 artifacts/BLAKE3SUMS.txt \
            --output "$RELEASE_METADATA"
          python3 scripts/release_metadata.py validate-release \
            --require-ready "$RELEASE_METADATA"
          echo "RELEASE_METADATA=$RELEASE_METADATA" >> "$GITHUB_ENV"
      - name: Authenticate the remote tag before candidate publication
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SOURCE: ${{ needs.classify.outputs.source-commit }}
          NIGHTLY: ${{ needs.classify.outputs.nightly }}
        run: |
          TAG_OBJECT=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$GITHUB_REF_NAME")
          TAG_TYPE=$(jq -er .object.type <<< "$TAG_OBJECT")
          TAG_COMMIT=$(jq -er .object.sha <<< "$TAG_OBJECT")
          for _ in {1..8}; do
            [[ "$TAG_TYPE" == tag ]] || break
            TAG_OBJECT=$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$TAG_COMMIT")
            TAG_TYPE=$(jq -er .object.type <<< "$TAG_OBJECT")
            TAG_COMMIT=$(jq -er .object.sha <<< "$TAG_OBJECT")
          done
          [[ "$TAG_TYPE" == commit ]]
          [[ "$TAG_COMMIT" == "$EXPECTED_SOURCE" ]]
          if [[ "$NIGHTLY" == true ]]; then
            BASE_VERSION="${GITHUB_REF_NAME%%-nightly.*}"
            BASE_REFS="$RUNNER_TEMP/canonical-base-refs.json"
            gh api "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/$BASE_VERSION" > "$BASE_REFS"
            if ! jq -e --arg ref "refs/tags/$BASE_VERSION" 'all(.ref != $ref)' "$BASE_REFS" >/dev/null; then
              echo "canonical $BASE_VERSION was tagged while this nightly waited for approval" >&2
              exit 1
            fi
          fi
      - name: Detect an interrupted never-published draft
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_PRERELEASE: ${{ needs.classify.outputs.nightly }}
        run: |
          RELEASES="$RUNNER_TEMP/releases-preflight.json"
          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --paginate --slurp > "$RELEASES"
          MATCH_COUNT=$(jq -er --arg tag "$GITHUB_REF_NAME" \
            '[.[][] | select(.tag_name == $tag)] | length' "$RELEASES")
          [[ "$MATCH_COUNT" -le 1 ]]
          if [[ "$MATCH_COUNT" == 0 ]]; then
            echo "EXISTING_RELEASE=0" >> "$GITHUB_ENV"
            exit 0
          fi
          jq -e --arg tag "$GITHUB_REF_NAME" --argjson prerelease "$EXPECTED_PRERELEASE" \
            '.[][] | select(.tag_name == $tag) | select(.draft == true and .prerelease == $prerelease and .published_at == null)' \
            "$RELEASES" >/dev/null || {
            echo "release $GITHUB_REF_NAME already exists and is not a never-published draft" >&2
            exit 1
          }
          echo "EXISTING_RELEASE=1" >> "$GITHUB_ENV"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        if: env.EXISTING_RELEASE != '1'
        with:
          subject-path: |
            artifacts/*.tar.gz
            artifacts/*.capsule
            artifacts/BLAKE3SUMS.txt
            artifacts/SHA256SUMS.txt
            artifacts/runtime-compatibility.toml
            artifacts/unicity-aos-*-release.toml
      - name: Sign release assets
        if: env.EXISTING_RELEASE != '1'
        env:
          COSIGN_YES: 'true'
        run: |
          cd artifacts
          for asset in ./*.tar.gz ./*.capsule BLAKE3SUMS.txt SHA256SUMS.txt runtime-compatibility.toml unicity-aos-*-release.toml; do
            cosign sign-blob --yes --bundle "${asset}.sigstore.json" "$asset"
          done
      - name: Verify release signatures use the exact tag identity
        if: env.EXISTING_RELEASE != '1'
        run: |
          cd artifacts
          IDENTITY="https://github.com/unicity-aos/aos-ce/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}"
          for asset in ./*.tar.gz ./*.capsule BLAKE3SUMS.txt SHA256SUMS.txt runtime-compatibility.toml unicity-aos-*-release.toml; do
            cosign verify-blob \
              --bundle "${asset}.sigstore.json" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity "$IDENTITY" \
              --use-signed-timestamps \
              "$asset"
          done
      - name: Write release notes
        run: |
          cat > release-notes.md <<EOF
          Unicity AOS Community Edition ${GITHUB_REF_NAME}.

          This product release bundles Astrid Runtime ${RUNTIME_TAG}. The exact runtime release identity, WIT commit, and compatibility pins are published in \`runtime-compatibility.toml\` and in every archive's \`release-manifest.json\`.

          The release also contains the 19 signed, installable capsule artifacts selected by Community Edition. Published \`astrid-capsule-*\` identities remain unchanged.

          Install this exact release:

          \`\`\`sh
          curl --proto '=https' --tlsv1.2 -fsSL https://aos.unicity.ai/install.sh | sh -s -- --version ${GITHUB_REF_NAME}
          \`\`\`

          Moving channel installs change only after a separate protected promotion.
          EOF
      - name: Refuse conflicting releases or authenticate a complete draft
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_PRERELEASE: ${{ needs.classify.outputs.nightly }}
          EXPECTED_SOURCE: ${{ needs.classify.outputs.source-commit }}
        run: |
          RELEASES="$RUNNER_TEMP/releases.json"
          MATCHING_RELEASE="$RUNNER_TEMP/matching-release.json"
          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --paginate \
            --slurp > "$RELEASES"
          jq --arg tag "$GITHUB_REF_NAME" \
            '[.[][] | select(.tag_name == $tag)]' "$RELEASES" > "$MATCHING_RELEASE"
          MATCH_COUNT=$(jq -er length "$MATCHING_RELEASE")
          [[ "$MATCH_COUNT" -le 1 ]]
          if [[ "$MATCH_COUNT" == 0 ]]; then
            echo "RECOVER_DRAFT=0" >> "$GITHUB_ENV"
            echo "CANDIDATE=$GITHUB_WORKSPACE/artifacts" >> "$GITHUB_ENV"
            exit 0
          fi

          jq -e --argjson prerelease "$EXPECTED_PRERELEASE" \
            '.[0] | .draft == true and .prerelease == $prerelease and .published_at == null' \
            "$MATCHING_RELEASE" >/dev/null || {
            echo "release $GITHUB_REF_NAME already exists and is not a never-published draft" >&2
            echo "release assets are write-once; never clobber, delete, or retag a published version" >&2
            exit 1
          }
          RELEASE_ID=$(jq -er '.[0].id' "$MATCHING_RELEASE")
          echo "SELECTED_RELEASE_ID=$RELEASE_ID" >> "$GITHUB_ENV"
          ASSETS="$RUNNER_TEMP/release-assets.json"
          gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?per_page=100" \
            --paginate --slurp > "$ASSETS"
          jq -e '[.[][]] | all(.state == "uploaded" and .size > 0)' "$ASSETS" >/dev/null
          jq -e '[.[][]] as $assets | ([$assets[].name] | unique | length) == ($assets | length)' \
            "$ASSETS" >/dev/null

          EXISTING_ASSETS="$RUNNER_TEMP/existing-release-assets"
          mkdir "$EXISTING_ASSETS"
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "$EXISTING_ASSETS"
          PAYLOADS="$RUNNER_TEMP/existing-release-payloads.txt"
          python3 scripts/release_publication.py \
            --artifacts "$EXISTING_ASSETS" \
            --version "$GITHUB_REF_NAME" \
            --source-commit "$EXPECTED_SOURCE" > "$PAYLOADS"
          (
            cd "$EXISTING_ASSETS"
            b3sum --check BLAKE3SUMS.txt
            sha256sum --check SHA256SUMS.txt
          )
          IDENTITY="https://github.com/unicity-aos/aos-ce/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}"
          while IFS= read -r asset; do
            cosign verify-blob \
              --bundle "$EXISTING_ASSETS/${asset}.sigstore.json" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity "$IDENTITY" \
              --use-signed-timestamps \
              "$EXISTING_ASSETS/$asset"
          done < "$PAYLOADS"
          {
            echo "RECOVER_DRAFT=1"
            echo "CANDIDATE=$EXISTING_ASSETS"
          } >> "$GITHUB_ENV"
      - name: Create draft release with write-once assets
        if: env.RECOVER_DRAFT != '1'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: true
          prerelease: ${{ needs.classify.outputs.nightly == 'true' }}
          make_latest: false
          overwrite_files: false
          fail_on_unmatched_files: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.capsule
            artifacts/BLAKE3SUMS.txt
            artifacts/SHA256SUMS.txt
            artifacts/runtime-compatibility.toml
            artifacts/unicity-aos-*-release.toml
            artifacts/*.sigstore.json
          body_path: release-notes.md
      - name: Bind newly created draft identity
        if: env.RECOVER_DRAFT != '1'
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_PRERELEASE: ${{ needs.classify.outputs.nightly }}
        run: |
          RELEASES="$RUNNER_TEMP/releases-after-create.json"
          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --paginate --slurp > "$RELEASES"
          RELEASE_ID=$(jq -er --arg tag "$GITHUB_REF_NAME" --argjson prerelease "$EXPECTED_PRERELEASE" \
            '[.[][] | select(.tag_name == $tag) | select(.draft == true and .prerelease == $prerelease and .published_at == null)] | select(length == 1) | .[0].id' \
            "$RELEASES")
          echo "SELECTED_RELEASE_ID=$RELEASE_ID" >> "$GITHUB_ENV"
      - name: Reauthenticate and publish the exact immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_PRERELEASE: ${{ needs.classify.outputs.nightly }}
          EXPECTED_SOURCE: ${{ needs.classify.outputs.source-commit }}
        run: |
          EXPECTED_LATEST=true
          if [[ "$EXPECTED_PRERELEASE" == true ]]; then
            EXPECTED_LATEST=false
          fi
          TAG_OBJECT=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$GITHUB_REF_NAME")
          TAG_TYPE=$(jq -er .object.type <<< "$TAG_OBJECT")
          TAG_COMMIT=$(jq -er .object.sha <<< "$TAG_OBJECT")
          for _ in {1..8}; do
            [[ "$TAG_TYPE" == tag ]] || break
            TAG_OBJECT=$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$TAG_COMMIT")
            TAG_TYPE=$(jq -er .object.type <<< "$TAG_OBJECT")
            TAG_COMMIT=$(jq -er .object.sha <<< "$TAG_OBJECT")
          done
          [[ "$TAG_TYPE" == commit ]]
          [[ "$TAG_COMMIT" == "$EXPECTED_SOURCE" ]]
          if [[ "$EXPECTED_PRERELEASE" == true ]]; then
            BASE_VERSION="${GITHUB_REF_NAME%%-nightly.*}"
            BASE_REFS="$RUNNER_TEMP/canonical-base-refs.json"
            gh api "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/$BASE_VERSION" > "$BASE_REFS"
            if ! jq -e --arg ref "refs/tags/$BASE_VERSION" 'all(.ref != $ref)' "$BASE_REFS" >/dev/null; then
              echo "canonical $BASE_VERSION was tagged before nightly publication" >&2
              exit 1
            fi
          fi

          RELEASES="$RUNNER_TEMP/releases-before-publish.json"
          MATCHING_RELEASE="$RUNNER_TEMP/matching-release-before-publish.json"
          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --paginate --slurp > "$RELEASES"
          jq --arg tag "$GITHUB_REF_NAME" \
            '[.[][] | select(.tag_name == $tag)]' "$RELEASES" > "$MATCHING_RELEASE"
          jq -e --argjson prerelease "$EXPECTED_PRERELEASE" \
            'length == 1 and .[0].draft == true and .[0].prerelease == $prerelease and .[0].published_at == null' \
            "$MATCHING_RELEASE" >/dev/null
          RELEASE_ID=$(jq -er '.[0].id' "$MATCHING_RELEASE")
          [[ "$RELEASE_ID" == "$SELECTED_RELEASE_ID" ]]
          ASSETS="$RUNNER_TEMP/release-assets-before-publish.json"
          gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?per_page=100" \
            --paginate --slurp > "$ASSETS"
          jq -e '[.[][]] | all(.state == "uploaded" and .size > 0)' "$ASSETS" >/dev/null
          jq -e '[.[][]] as $assets | ([$assets[].name] | unique | length) == ($assets | length)' \
            "$ASSETS" >/dev/null

          FINAL="$RUNNER_TEMP/final-release-assets"
          mkdir "$FINAL"
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "$FINAL"
          PAYLOADS="$RUNNER_TEMP/final-release-payloads.txt"
          python3 scripts/release_publication.py \
            --artifacts "$FINAL" \
            --version "$GITHUB_REF_NAME" \
            --source-commit "$EXPECTED_SOURCE" > "$PAYLOADS"
          (
            cd "$FINAL"
            b3sum --check BLAKE3SUMS.txt
            sha256sum --check SHA256SUMS.txt
          )
          IDENTITY="https://github.com/unicity-aos/aos-ce/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}"
          while IFS= read -r asset; do
            cmp "$CANDIDATE/$asset" "$FINAL/$asset"
            cmp "$CANDIDATE/${asset}.sigstore.json" "$FINAL/${asset}.sigstore.json"
            cosign verify-blob \
              --bundle "$FINAL/${asset}.sigstore.json" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity "$IDENTITY" \
              --use-signed-timestamps \
              "$FINAL/$asset"
          done < "$PAYLOADS"

          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -F draft=false \
            -f make_latest="$EXPECTED_LATEST" \
            | jq -e --argjson prerelease "$EXPECTED_PRERELEASE" \
              'select(.draft == false and .immutable == true and .prerelease == $prerelease and .published_at != null) | true' \
            | grep -Fx true
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" \
            | jq -e --arg id "$RELEASE_ID" --argjson prerelease "$EXPECTED_PRERELEASE" \
              'select((.id | tostring) == $id and .draft == false and .immutable == true and .prerelease == $prerelease and .published_at != null) | true' \
            | grep -Fx true

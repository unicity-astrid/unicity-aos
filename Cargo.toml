[package]
name = "astrid-capsule-prompt-builder"
version = "0.1.0"
edition = "2024"
description = "Prompt assembly capsule — fires interceptor hooks and merges plugin contributions into the final LLM prompt"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
astrid-sdk = { version = "0.5.2", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
extism-pdk = "1.4.1"  # required by #[capsule] macro-generated code
uuid = { version = "1.22", features = ["rng-getrandom"] }

[package]
name = "astrid-capsule-session"
version = "0.2.0"
edition = "2024"
description = "Persistent conversation session store for Astrid OS"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
astrid-sdk = { version = "0.7", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.22", features = ["v4", "rng-getrandom"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"

# Local-path overrides for the post-PR-#752 SDK that targets the
# per-domain WIT host ABI. These are removed once sdk-rust 0.7.0
# ships to crates.io.

[package]
name = "astrid-capsule-registry"
version = "0.1.0"
edition = "2024"
description = "LLM provider registry capsule for Astrid OS"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
astrid-sdk = { version = "0.7", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# UUIDv5 only — used to authenticate a provider's self-reported `<capsule>`
# qualifier against the kernel-stamped `source_id`. v5 is SHA-1 based and
# pulls no RNG/getrandom, so `default-features = false` keeps the wasm build
# clean.
uuid = { version = "1", default-features = false, features = ["v5"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"

# Local-path overrides for per-domain WIT SDK migration. Removed when
# astrid-sdk 0.7.0 ships to crates.io. See CAPSULE_MIGRATION_GUIDE.md.

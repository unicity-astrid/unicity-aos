[package]
name = "astrid-capsule-memory"
version = "0.1.0"
edition = "2024"
description = "Cross-session memory capsule for Astrid OS"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
astrid-sdk = { version = "0.6.0", features = ["derive"] }
uuid = { version = "1.22", features = ["rng-getrandom"] }
serde = "1.0"
serde_json = "1.0"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"

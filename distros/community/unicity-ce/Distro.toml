schema-version = 1

[distro]
id = "unicity-ce"
name = "Unicity CE"
pretty-name = "Unicity CE 2026.1.1 (Genesis)"
version = "2026.1.1"
codename = "genesis"
release-date = "2026-07-17"
description = "The complete Unicity AOS agent operating system experience"
authors = ["Joshua J. Bouw <dev@joshuajbouw.com>", "Unicity Labs <info@unicity-labs.com>"]
maintainers = ["Joshua J. Bouw <jjb@unicity-labs.com>"]
homepage = "https://github.com/unicity-aos/aos-ce"
support = "https://github.com/unicity-aos/aos-ce/discussions"
bug-tracker = "https://github.com/unicity-aos/aos-ce/issues"
repository = "https://github.com/unicity-aos/aos-ce"
license = "MIT OR Apache-2.0"
astrid-version = "=0.10.1"  # Product releases pin the exact bundled runtime; update this with release/runtime-compatibility.toml.

[distro.requires.astrid]
llm = "^1.0"
session = "^1.0"
spark = "^1.0"
tool = "^1.0"

[variables]
openai_api_key = { secret = true, description = "API key for OpenAI-compatible LLM provider" }
openai_base_url = { description = "API base URL", default = "https://api.openai.com" }
openai_model = { description = "Default model ID", default = "gpt-5.4" }
openai_temperature = { description = "Default temperature (0.0-2.0, blank = provider default)", default = "" }
openai_max_tokens = { description = "Max output tokens", default = "128000" }

# ---------------------------------------------------------------------------
# Uplinks (frontends)
# ---------------------------------------------------------------------------

[[capsule]]
name = "aos-cli"
source = "capsules/aos-cli.capsule"
version = "0.2.0"
role = "uplink"

[[capsule]]
name = "aos-registry"
source = "capsules/aos-registry.capsule"
version = "0.2.0"
role = "uplink"

# ---------------------------------------------------------------------------
# LLM providers (multi-select — user picks which to install)
# ---------------------------------------------------------------------------

[[capsule]]
name = "aos-openai-compat"
source = "capsules/aos-openai-compat.capsule"
version = "0.2.0"
group = "llm"
env = { api_key = "{{ openai_api_key }}", base_url = "{{ openai_base_url }}", model = "{{ openai_model }}", temperature = "{{ openai_temperature }}", max_output_tokens = "{{ openai_max_tokens }}" }

# ---------------------------------------------------------------------------
# Core infrastructure (always installed)
# ---------------------------------------------------------------------------

[[capsule]]
name = "aos-react"
source = "capsules/aos-react.capsule"
version = "0.2.2"

[[capsule]]
name = "aos-session"
source = "capsules/aos-session.capsule"
version = "0.2.0"

[[capsule]]
name = "aos-identity"
source = "capsules/aos-identity.capsule"
version = "0.2.0"

[[capsule]]
name = "aos-users"
source = "capsules/aos-users.capsule"
version = "0.1.0"

[[capsule]]
name = "aos-router"
source = "capsules/aos-router.capsule"
version = "0.2.0"

[[capsule]]
name = "aos-prompt-builder"
source = "capsules/aos-prompt-builder.capsule"
version = "0.2.0"

[[capsule]]
name = "aos-context-engine"
source = "capsules/aos-context-engine.capsule"
version = "0.2.0"

[[capsule]]
name = "aos-hook-bridge"
source = "capsules/aos-hook-bridge.capsule"
version = "0.2.0"

# ---------------------------------------------------------------------------
# Tools
# ---------------------------------------------------------------------------

[[capsule]]
name = "aos-shell"
source = "capsules/aos-shell.capsule"
version = "0.2.0"

[[capsule]]
name = "aos-http"
source = "capsules/aos-http.capsule"
version = "0.1.1"

[[capsule]]
name = "aos-fs"
source = "capsules/aos-fs.capsule"
version = "0.2.0"

[[capsule]]
name = "aos-system"
source = "capsules/aos-system.capsule"
version = "0.2.0"

# ---------------------------------------------------------------------------
# Extensions
# ---------------------------------------------------------------------------

[[capsule]]
name = "aos-skills"
source = "capsules/aos-skills.capsule"
version = "0.2.0"

[[capsule]]
name = "aos-agents"
source = "capsules/aos-agents.capsule"
version = "0.2.0"
env = { cwd_dir = ".aos" }

[[capsule]]
name = "aos-memory"
source = "capsules/aos-memory.capsule"
version = "0.2.0"
env = { cwd_dir = ".aos" }

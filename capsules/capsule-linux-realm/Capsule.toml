[package]
name = "aos-linux-realm"
version = "0.1.0"
description = "Principal-owned AOS Realm workbench"
authors = [
    "Joshua J. Bouw <dev@joshuajbouw.com>",
    "Unicity Labs <info@unicity-labs.com>",
]
astrid-version = ">=0.10.1"

[[component]]
id = "linux-realm"
file = "aos_linux_realm.wasm"
type = "executable"

# The realm sees only the invocation CWD, its private subtree of the caller's
# principal home, and its principal-scoped tmp subtree. It has no host_process.
[capabilities]
kv = []
fs_read = ["cwd://", "home://.local/share/aos-realm/", "home://.local/tmp/aos-realm/"]
fs_write = ["cwd://", "home://.local/share/aos-realm/", "home://.local/tmp/aos-realm/"]

[publish]
"tool.v1.execute.*.result" = { wit = "@unicity-astrid/wit/types/tool-call-result" }
"tool.v1.response.describe.*" = { wit = "@unicity-astrid/wit/tool/describe-response" }

[subscribe]
"tool.v1.execute.linux_realm_exec" = { wit = "@unicity-astrid/wit/types/tool-call", handler = "tool_execute_linux_realm_exec" }
"tool.v1.execute.linux_realm_status" = { wit = "@unicity-astrid/wit/types/tool-call", handler = "tool_execute_linux_realm_status" }
"tool.v1.request.describe" = { wit = "@unicity-astrid/wit/tool/describe-request", handler = "tool_describe" }
# No capsule publishes this topic. Linux execution owns a private subscription
# and performs recv(0) between RV64 slices so the Astrid run-loop watchdog sees
# a real cooperative host yield instead of one long CPU-bound WASM turn.
"realm.v1.linux.cooperate" = "opaque"

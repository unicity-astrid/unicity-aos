[package]
name = "aos-memory"
version = "0.2.0"
description = "Injects cross-session memory into the system prompt via prompt builder hooks"
authors = ["Joshua J. Bouw <dev@joshuajbouw.com>", "Unicity Labs <info@unicity-labs.com>"]
astrid-version = ">=0.1.0"

[[component]]
id = "memory"
file = "aos_memory.wasm"
type = "executable"
capabilities = { fs_read = ["cwd://", "home://"] }

[capabilities]
allow_prompt_injection = true

[publish]
"prompt_builder.v1.hook_response.*" = { wit = "@unicity-astrid/wit/prompt/before-build-hook-response" }

[subscribe]
"prompt_builder.v1.hook.before_build" = { wit = "@unicity-astrid/wit/prompt/before-build-hook", handler = "on_before_prompt_build" }

[env]
# Name of the project folder scanned for memory.md (set by the distro).
# Override to rebrand without forking: set cwd_dir = ".myagent" in your Distro.toml.
cwd_dir = { type = "string", request = "Project folder name", default = ".astrid" }

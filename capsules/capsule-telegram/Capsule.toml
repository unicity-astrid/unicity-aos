[package]
name = "aos-telegram"
version = "0.1.0"
description = "Telegram Bot frontend for Unicity AOS — bridges the Telegram Bot API to the kernel IPC bus."
authors = ["Unicity Labs <info@unicity-labs.com>"]
astrid-version = ">=0.5.0"

[[component]]
id = "telegram"
file = "aos_telegram.wasm"
type = "executable"
capabilities = { net = ["*"] }

[capabilities]
uplink = true
net = ["*"]
ipc_publish = [
    "user.v1.prompt",
    "astrid.v1.approval.response.*",
    "astrid.v1.elicit.response.*",
]
ipc_subscribe = [
    "agent.v1.response",
    "agent.v1.stream.delta",
    "astrid.v1.approval",
    "astrid.v1.elicit.*",
    "astrid.v1.response.*",
]

[env]
bot_token = { type = "secret", request = "Enter your Telegram Bot Token (from @BotFather)", placeholder = "123456:ABC-DEF..." }
allowed_user_ids = { type = "string", request = "Comma-separated Telegram user IDs allowed to use the bot (leave empty for unrestricted)", default = "" }

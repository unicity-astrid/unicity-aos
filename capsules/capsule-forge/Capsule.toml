[package]
name = "aos-forge"
version = "0.1.0"
description = "Agent-facing construction tooling for building Unicity AOS capsules and harnesses"
authors = ["Joshua J. Bouw <dev@joshuajbouw.com>", "Unicity Labs <info@unicity-labs.com>"]
astrid-version = ">=0.7.0"

[[component]]
id = "forge-tools"
file = "aos_forge.wasm"
type = "executable"

[capabilities]
fs_read  = ["home://"]
fs_write = ["home://skills/"]

# Publish ACL: the [publish] keys are the only IPC-publish declaration.
# These two are the mandatory tool-bus boilerplate — without them tool
# results never return and the describe fan-out can't answer.
[publish]
"tool.v1.execute.*.result" = { wit = "@unicity-astrid/wit/types/tool-call-result" }
"tool.v1.response.describe.*" = { wit = "@unicity-astrid/wit/tool/describe-response" }

# Interceptor bindings: a [subscribe] entry's `handler` binds the topic to a
# generated `#[astrid::tool]` export. The keys also serve as the subscribe ACL.
# `tool_describe` is auto-generated by the #[capsule] macro from the
# #[astrid::tool] annotations — declared here but never hand-written.
[subscribe]
"tool.v1.execute.forge_quickstart" = { wit = "@unicity-astrid/wit/types/tool-call", handler = "tool_execute_forge_quickstart" }
"tool.v1.execute.meta_harness_quickstart" = { wit = "@unicity-astrid/wit/types/tool-call", handler = "tool_execute_meta_harness_quickstart" }
"tool.v1.execute.scaffold_capsule" = { wit = "@unicity-astrid/wit/types/tool-call", handler = "tool_execute_scaffold_capsule" }
"tool.v1.execute.explain_interface" = { wit = "@unicity-astrid/wit/types/tool-call", handler = "tool_execute_explain_interface" }
"tool.v1.execute.suggest_capabilities" = { wit = "@unicity-astrid/wit/types/tool-call", handler = "tool_execute_suggest_capabilities" }
"tool.v1.execute.validate_manifest" = { wit = "@unicity-astrid/wit/types/tool-call", handler = "tool_execute_validate_manifest" }
"tool.v1.execute.capsule_doctor" = { wit = "@unicity-astrid/wit/types/tool-call", handler = "tool_execute_capsule_doctor" }
"tool.v1.request.describe" = { wit = "@unicity-astrid/wit/tool/describe-request", handler = "tool_describe" }

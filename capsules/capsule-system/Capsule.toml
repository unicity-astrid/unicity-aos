[package]
name = "aos-system"
version = "0.2.0"
description = "System management tools — lets the LLM inspect and manage its own runtime"
authors = ["Joshua J. Bouw <dev@joshuajbouw.com>", "Unicity Labs <info@unicity-labs.com>"]
astrid-version = ">=0.1.0"

[[component]]
id = "system-tools"
file = "aos_system.wasm"
type = "executable"

[capabilities]
fs_read  = ["home://"]
fs_write = ["home://skills/"]

# Publish ACL: the [publish] keys are the only IPC-publish declaration.
[publish]
"tool.v1.execute.*.result" = { wit = "@unicity-astrid/wit/types/tool-call-result" }
"tool.v1.response.describe.*" = { wit = "@unicity-astrid/wit/tool/describe-response" }

# Interceptor bindings: a [subscribe] entry's `handler` binds the topic to a
# `#[astrid::interceptor]` export. The keys also serve as the subscribe ACL.
[subscribe]
"tool.v1.execute.list_capsules" = { wit = "@unicity-astrid/wit/types/tool-call", handler = "tool_execute_list_capsules" }
"tool.v1.execute.inspect_capsule" = { wit = "@unicity-astrid/wit/types/tool-call", handler = "tool_execute_inspect_capsule" }
"tool.v1.execute.list_interfaces" = { wit = "@unicity-astrid/wit/types/tool-call", handler = "tool_execute_list_interfaces" }
"tool.v1.execute.read_interface" = { wit = "@unicity-astrid/wit/types/tool-call", handler = "tool_execute_read_interface" }
"tool.v1.execute.system_status" = { wit = "@unicity-astrid/wit/types/tool-call", handler = "tool_execute_system_status" }
"tool.v1.request.describe" = { wit = "@unicity-astrid/wit/tool/describe-request", handler = "tool_describe" }
